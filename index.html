<!DOCTYPE html>
<html lang="lv">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Maciņš</title>

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Playfair Display', 'Georgia', 'serif'],
            body: ['DM Sans', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* === Luxury Fintech Design System === */
    :root {
      --bg-primary: #0a0a0b;
      --bg-secondary: #141416;
      --bg-tertiary: #1c1c1f;
      --bg-elevated: #232327;
      --text-primary: #f5f5f0;
      --text-secondary: #8a8a8e;
      --text-tertiary: #4a4a4e;
      --accent-primary: #d4a853;
      --accent-secondary: #c47d2e;
      --accent-glow: rgba(212, 168, 83, 0.15);
      --success: #4ade80;
      --danger: #f87171;
      --warning: #fbbf24;
      --info: #60a5fa;
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 168, 83, 0.2);
    }

    /* Global Utility Classes */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'DM Sans', system-ui, sans-serif;
      overscroll-behavior-y: none;
    }

    /* Grain texture overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* Selection colors */
    ::selection {
      background-color: rgba(212, 168, 83, 0.3);
      color: #f5f5f0;
    }

    /* Gold glow effect for active elements */
    .gold-glow {
      box-shadow: 0 0 20px rgba(212, 168, 83, 0.15), 0 0 40px rgba(212, 168, 83, 0.05);
    }

    /* Subtle border style */
    .border-subtle {
      border-color: var(--border);
    }

    /* Accent border */
    .border-gold {
      border-color: var(--border-accent);
    }
  </style>
</head>

<body class="overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
